databases:
  - name: baita-coin-db
    plan: free

services:
  - name: baita-coin-api
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baita-coin-db
          property: connectionString
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: CORS_ALLOW_ORIGINS
        value: "*"

  - name: baita-coin-expirar-lotes
    type: cron
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "0 6 * * *"
    dockerCommand: python -m baita_coin.jobs.expirar_lotes
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baita-coin-db
          property: connectionString
